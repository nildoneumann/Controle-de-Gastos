<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Gastos</title>
<link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00aaff">
    <!-- Ícones do PWA -->
    <link rel="icon" href="icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-512.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:Arial, sans-serif;
  margin:0;
  background:#f4f6f9;
}
header{
  background:#2c3e50;
  color:#fff;
  padding:15px;
  text-align:center;
}
.container{
  padding:15px;
  max-width:1000px;
  margin:auto;
}
.card{
  background:#fff;
  padding:7px 15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
input, select, button{
  width:100%;
  padding:8px;
  margin-top:5px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  background:#27ae60;
  color:#fff;
  border:none;
  font-weight:bold;
}
button:hover{
  background:#219150;
}
.table{
  width:100%;
  border-collapse:collapse;
}
.table th, .table td{
  padding:5px;
  border-bottom:1px solid #ddd;
  text-align:left;
}
.flex{
  display:flex;
  gap:10px;
}
.flex div{
  flex:1;
}
@media(max-width:600px){
  .flex{
    flex-direction:column;
  }
}
</style>
</head>

<body>
<label for="nome" style="font-size: 8px; color:blue; margin-left: 10px">© 2025 Leonildo.Neumann</label>
<header>
<h2>💰 Controle de Gastos</h2>
</header>

<div class="container">

<div class="card">
<h3>Adicionar Transação</h3>
<input id="descricao" placeholder="Descrição" style="max-width:97%">
<input id="valor" type="number" placeholder="Valor" style="max-width:97%">
<select id="categoria">
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Moradia</option>
<option>Outros</option>
<option>Renda</option>
</select>
<select id="tipo">
<option value="gasto">Gasto</option>
<option value="receita">Receita</option>
</select>
<button onclick="adicionar()">Salvar</button>
</div>

<div class="card" style="padding:2px 15px; background:#ddfada">
<h3>Resumo</h3>
<p>Saldo: R$ <span id="saldo">0</span></p>
<p>Receitas: R$ <span id="receitas">0</span></p>
<p>Gastos: R$ <span id="gastos">0</span></p>
</div>

<div class="card">
<canvas id="grafico" style="max-height: 225px"></canvas>
</div>

<div class="card" style="padding:7px 15px">
<button onclick="exportarPDF()">📄 Exportar PDF</button>
</div>

<div class="card">
<h3>Histórico</h3>
<table class="table">
<thead>
<tr>
<th>Descrição</th>
<th>Valor</th>
<th>Categoria</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>
</div>

</div>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("Service Worker registrado"))
    .catch(err => console.error("Erro SW:", err));
}

let dados = JSON.parse(localStorage.getItem('gastos')) || [];
let editIndex = null;

function salvarStorage(){
  localStorage.setItem('gastos', JSON.stringify(dados));
}

function adicionar(){
  const descricaoInput = document.getElementById('descricao');
  const valorInput = document.getElementById('valor');
  const categoriaInput = document.getElementById('categoria');
  const tipoInput = document.getElementById('tipo');

  const descricao = descricaoInput.value;
  const valor = parseFloat(valorInput.value);

  if(!descricao || isNaN(valor)) return alert('Preencha corretamente');

  const item = {
    descricao,
    valor,
    categoria: categoriaInput.value,
    tipo: tipoInput.value
  };

  if(editIndex !== null){
    dados[editIndex] = item;
    editIndex = null;
  } else {
    dados.push(item);
  }

  salvarStorage();
  atualizar();

  descricaoInput.value = '';
  valorInput.value = '';
  categoriaInput.selectedIndex = 0;
  tipoInput.value = 'gasto';
}

function editar(index){
  const item = dados[index];

  document.getElementById('descricao').value = item.descricao;
  document.getElementById('valor').value = item.valor;
  document.getElementById('categoria').value = item.categoria;
  document.getElementById('tipo').value = item.tipo;

  editIndex = index;
}

function remover(index){
  dados.splice(index,1);
  salvarStorage();
  atualizar();
}

function atualizar(){
  const lista = document.getElementById('lista');
  lista.innerHTML = '';

  let receitas = 0;
  let gastos = 0;

  dados.forEach((item, index)=>{
    if(item.tipo === 'receita') receitas += item.valor;
    else gastos += item.valor;

    lista.innerHTML += `
      <tr>
        <td>${item.descricao}</td>
        <td>R$ ${item.valor.toFixed(2)}</td>
        <td>${item.categoria}</td>
        <td>
          <button onclick="editar(${index})" style="margin-bottom:5px; border: 1px solid red; padding:2px 0px; font-size:11px">editar</button>
          <button onclick="remover(${index})" style="margin-bottom:5px; border: 1px solid red; padding:2px 0px; font-size:11px">excluir</button>
        </td>
      </tr>`;
  });

  document.getElementById('receitas').innerText = receitas.toFixed(2);
  document.getElementById('gastos').innerText = gastos.toFixed(2);
  document.getElementById('saldo').innerText = (receitas - gastos).toFixed(2);

  atualizarGrafico();
}

let chart;
function atualizarGrafico(){
  const categorias = {};

  dados.forEach(item=>{
    if(item.tipo==='gasto'){
      categorias[item.categoria] = (categorias[item.categoria]||0)+item.valor;
    }
  });

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById('grafico'),{
    type:'doughnut',
    data:{labels:Object.keys(categorias),datasets:[{data:Object.values(categorias)}]}
  });
}

function exportarPDF(){
  try {
    if (!window.jspdf || !window.jspdf.jsPDF) {
      alert('Biblioteca PDF não carregou');
      return;
    }

    const doc = new window.jspdf.jsPDF();

    let receitas = 0;
    let gastos = 0;

    dados.forEach(item=>{
      if(item.tipo === 'receita') receitas += item.valor;
      else gastos += item.valor;
    });

    const saldo = receitas - gastos;
    const dataAtual = new Date().toLocaleDateString('pt-BR');

    // 🔥 TÍTULO EM NEGRITO
    doc.setFont(undefined, 'bold');
    doc.setTextColor(41, 128, 185); // Define cor azul (R, G, B)
    doc.setFontSize(16);
    doc.text('RELATÓRIO FINANCEIRO', 105, 15, null, null, 'center');

    // 🔥 VOLTA PARA NORMAL
    doc.setTextColor(0, 0, 0);
    doc.setFont(undefined, 'normal');
    doc.setFontSize(10);

    doc.text('Data: ' + dataAtual, 10, 25);
    doc.text('Receitas: R$ ' + receitas.toFixed(2), 10, 35);
    doc.text('Gastos: R$ ' + gastos.toFixed(2), 10, 42);
    doc.text('Saldo: R$ ' + saldo.toFixed(2), 10, 49);

    doc.line(10, 55, 200, 55);

    let y = 65;

    // 🔥 CABEÇALHO TABELA EM NEGRITO
    doc.setFont(undefined, 'bold');
    doc.setTextColor(41, 128, 185); // Define cor azul (R, G, B)
    doc.text('Descrição', 10, y);
    doc.text('Categoria', 90, y);
    doc.text('Valor', 160, y);

    // 🔥 CONTEÚDO NORMAL
    doc.setTextColor(0, 0, 0);
    doc.setFont(undefined, 'normal');

    y += 10;

    dados.forEach(item => {
      doc.text(String(item.descricao).substring(0,30), 10, y);
      doc.text(String(item.categoria), 90, y);
      doc.text('R$ ' + item.valor.toFixed(2), 160, y);

      y += 8;

      if (y > 280) {
        doc.addPage();
        y = 20;
      }
    });

    doc.save('relatorio-financeiro.pdf');

  } catch (e) {
    console.error(e);
    alert('Erro ao gerar PDF');
  }
}

// Inicialização
atualizar();

</script>

</body>
</html>
