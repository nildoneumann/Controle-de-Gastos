<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Controle de Gastos</title>
<link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00aaff">
    <!-- Ícones do PWA -->
    <link rel="icon" href="icon-192.png" type="image/png">
    <link rel="apple-touch-icon" href="icon-512.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
  font-family:Arial, sans-serif;
  margin:0;
  background:#f4f6f9;
}
header{
  background:#2c3e50;
  color:#fff;
  padding:15px;
  text-align:center;
}
.container{
  padding:15px;
  max-width:1000px;
  margin:auto;
}
.card{
  background:#fff;
  padding:15px;
  border-radius:10px;
  margin-bottom:15px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
input, select, button{
  width:100%;
  padding:8px;
  margin-top:5px;
  margin-bottom:10px;
  border-radius:8px;
  border:1px solid #ccc;
}
button{
  background:#27ae60;
  color:#fff;
  border:none;
  font-weight:bold;
}
button:hover{
  background:#219150;
}
.table{
  width:100%;
  border-collapse:collapse;
}
.table th, .table td{
  padding:5px;
  border-bottom:1px solid #ddd;
  text-align:left;
}
.flex{
  display:flex;
  gap:10px;
}
.flex div{
  flex:1;
}
@media(max-width:600px){
  .flex{
    flex-direction:column;
  }
}
</style>
</head>

<body>
<label for="nome" style="font-size: 8px; color:blue; margin-left: 10px">© 2025 Leonildo.Neumann</label>
<header>
<h2>💰 Controle de Gastos</h2>
</header>

<div class="container">

<div class="card">
<h3>Adicionar Transação</h3>
<input id="descricao" placeholder="Descrição" style="max-width:97%">
<input id="valor" type="number" placeholder="Valor" style="max-width:97%">
<select id="categoria">
<option>Alimentação</option>
<option>Transporte</option>
<option>Lazer</option>
<option>Moradia</option>
<option>Outros</option>
<option>Renda</option>
</select>
<select id="tipo">
<option value="gasto">Gasto</option>
<option value="receita">Receita</option>
</select>
<button onclick="adicionar()">Salvar</button>
</div>

<div class="card" style="padding:2px 15px; background:#ddfada">
<h3>Resumo</h3>
<p>Saldo: R$ <span id="saldo">0</span></p>
<p>Receitas: R$ <span id="receitas">0</span></p>
<p>Gastos: R$ <span id="gastos">0</span></p>
</div>

<div class="card">
<canvas id="grafico" style="max-height: 300px"></canvas>
</div>

<div class="card" style="padding:7px 15px">
<button onclick="exportarPDF()">📄 Exportar PDF</button>
</div>

<div class="card">
<h3>Histórico</h3>
<table class="table">
<thead>
<tr>
<th>Descrição</th>
<th>Valor</th>
<th>Categoria</th>
<th>Ação</th>
</tr>
</thead>
<tbody id="lista"></tbody>
</table>
</div>

</div>

<script>
if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
    .then(() => console.log("Service Worker registrado"))
    .catch(err => console.error("Erro SW:", err));
}

let dados = JSON.parse(localStorage.getItem('gastos')) || [];

function salvarStorage(){
  localStorage.setItem('gastos', JSON.stringify(dados));
}

function adicionar(){
  const descricao = document.getElementById('descricao').value;
  const valor = parseFloat(document.getElementById('valor').value);
  const categoria = document.getElementById('categoria').value;
  const tipo = document.getElementById('tipo').value;

  if(!descricao || isNaN(valor)) return alert('Preencha os campos corretamente');

  dados.push({descricao, valor, categoria, tipo});
  salvarStorage();
  atualizar();
}
  
    
function remover(index){
  dados.splice(index,1);
  salvarStorage();
  atualizar();
}

function atualizar(){
  const lista = document.getElementById('lista');
  lista.innerHTML = '';

  let receitas = 0;
  let gastos = 0;

  dados.forEach((item, index)=>{
    if(item.tipo === 'receita') receitas += item.valor;
    else gastos += item.valor;

    lista.innerHTML += `
      <tr>
        <td>${item.descricao}</td>
        <td>R$ ${item.valor.toFixed(2)}</td>
        <td>${item.categoria}</td>
        <td><button onclick="remover(${index})" style="background-color: red; margin-bottom:5px">X</button></td>
      </tr>
    `;
  });

  document.getElementById('receitas').innerText = receitas.toFixed(2);
  document.getElementById('gastos').innerText = gastos.toFixed(2);
  document.getElementById('saldo').innerText = (receitas - gastos).toFixed(2);

  atualizarGrafico();
}

let chart;
function atualizarGrafico(){
  const categorias = {};

  dados.forEach(item=>{
    if(item.tipo === 'gasto'){
      categorias[item.categoria] = (categorias[item.categoria] || 0) + item.valor;
    }
  });

  const labels = Object.keys(categorias);
  const valores = Object.values(categorias);

  if(chart) chart.destroy();

  const ctx = document.getElementById('grafico');
  chart = new Chart(ctx, {
    type:'doughnut',
    data:{
      labels: labels,
      datasets:[{data: valores}]
    }
  });
}

function exportarPDF(){
  try {
    if (!window.jspdf || !window.jspdf.jsPDF) {
      alert('Biblioteca PDF não carregou');
      return;
    }

    const doc = new window.jspdf.jsPDF();

    let receitas = 0;
    let gastos = 0;

    dados.forEach(item=>{
      if(item.tipo === 'receita') receitas += item.valor;
      else gastos += item.valor;
    });

    const saldo = receitas - gastos;
    const dataAtual = new Date().toLocaleDateString('pt-BR');

    doc.setFontSize(16);
    doc.text('RELATÓRIO FINANCEIRO', 105, 15, null, null, 'center');

    doc.setFontSize(10);
    doc.text('Data: ' + dataAtual, 10, 25);
    doc.text('Receitas: R$ ' + receitas.toFixed(2), 10, 35);
    doc.text('Gastos: R$ ' + gastos.toFixed(2), 10, 42);
    doc.text('Saldo: R$ ' + saldo.toFixed(2), 10, 49);

    doc.line(10, 55, 200, 55);

    let y = 65;

    doc.text('Descrição', 10, y);
    doc.text('Categoria', 90, y);
    doc.text('Valor', 160, y);

    y += 10;

    dados.forEach(item => {
      doc.text(String(item.descricao).substring(0,30), 10, y);
      doc.text(String(item.categoria), 90, y);
      doc.text('R$ ' + item.valor.toFixed(2), 160, y);

      y += 8;

      if (y > 280) {
        doc.addPage();
        y = 20;
      }
    });

    doc.save('relatorio-financeiro.pdf');

  } catch (e) {
    console.error(e);
    alert('Erro ao gerar PDF');
  }
}

// Inicialização
atualizar();
</script>

</body>
</html>
